<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORDO Platform</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #8b949e;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .logo span { color: #58a6ff; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 960px;
    padding: 0 24px;
  }

  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 14px;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .2s, transform .2s;
  }

  .card:hover {
    border-color: #58a6ff55;
    transform: translateY(-2px);
  }

  .card-name {
    font-size: 16px;
    font-weight: 700;
    color: #e6edf3;
  }

  .card-sub {
    font-size: 11px;
    color: #58a6ff;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .card-desc {
    font-size: 13px;
    color: #8b949e;
    line-height: 1.6;
    flex: 1;
  }

  .enter-btn {
    display: block;
    margin-top: 10px;
    padding: 10px 0;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    text-align: center;
    transition: background .15s, border-color .15s, color .15s;
  }

  .enter-btn:hover {
    background: #58a6ff;
    border-color: #58a6ff;
    color: #fff;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="logo">ORDO <span>Platform</span></div>

<div class="grid">

  <div class="card">
    <div class="card-name">ORDO AI</div>
    <div class="card-sub">RAG · Туры</div>
    <p class="card-desc">Поиск туров через чат, система бронирования и маршрутизация.</p>
    <a class="enter-btn" href="https://taxi-armor-ken-excess.trycloudflare.com" target="_blank">Войти</a>
  </div>

  <div class="card">
    <div class="card-name">ORDO AI Tracking</div>
    <div class="card-sub">GPS · Реальное время</div>
    <p class="card-desc">GPS-трекинг туристов, сессии, вебсокеты, кошелёк.</p>
    <a class="enter-btn" href="https://outreach-trainers-cursor-harrison.trycloudflare.com" target="_blank">Войти</a>
  </div>

  <div class="card">
    <div class="card-name">ORDO</div>
    <div class="card-sub">CRM · Бэкенд</div>
    <p class="card-desc">Компании, водители, гиды, отели, активности, бронирования.</p>
    <a class="enter-btn" href="https://burke-commands-barnes-residents.trycloudflare.com" target="_blank">Войти</a>
  </div>

</div>

</body>
</html>
