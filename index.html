<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORDO Platform</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #8b949e;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .logo span { color: #58a6ff; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 720px;
    padding: 0 24px;
  }

  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 14px;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: border-color .2s, transform .2s;
  }

  .card:hover {
    border-color: #58a6ff55;
    transform: translateY(-2px);
  }

  .card-name {
    font-size: 18px;
    font-weight: 700;
    color: #e6edf3;
  }

  .card-desc {
    font-size: 13px;
    color: #8b949e;
    line-height: 1.65;
    flex: 1;
  }

  .enter-btn {
    display: block;
    margin-top: 8px;
    padding: 11px 0;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    text-align: center;
    transition: background .15s, border-color .15s, color .15s;
  }

  .enter-btn:hover {
    background: #58a6ff;
    border-color: #58a6ff;
    color: #fff;
  }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="logo">ORDO <span>Platform</span></div>

<div class="grid">

  <div class="card">
    <div class="card-name">ORDO AI</div>
    <p class="card-desc">
      RAG-поиск туров, чат-бот, система бронирования и GPS-трекинг туристов в реальном времени.
    </p>
    <a class="enter-btn" href="http://localhost:5050" target="_blank">Войти</a>
  </div>

  <div class="card">
    <div class="card-name">ORDO TRACKING</div>
    <p class="card-desc">
      Управление компаниями, водителями, гидами, отелями, активностями и бронированиями.
    </p>
    <a class="enter-btn" href="http://localhost:8001" target="_blank">Войти</a>
  </div>

</div>

</body>
</html>
